debug: false
commit: false
interactive: false
upsert_method: "upsert"  # Options: "upsert", "insert", "update"
logfile: "pg_upsert.log"
host: "localhost"
port: 5432
user: "docker"
database: "dev"
staging_schema: "staging"
base_schema: "public"
encoding: "utf-8"
tables:
  - "authors"
  - "publishers"
  - "books"
  - "book_authors"
  - "genres"
exclude_columns:  # Excluded from upsert on every table
  - "rev_time"
  - "rev_user"
null_columns:  # Skipped during null checks on every table
  - "book_alias"
# Per-table excludes are merged on top of the global lists above.
# exclude_columns_by_table:
#   books:
#     - "isbn_legacy"
# null_columns_by_table:
#   books:
#     - "reprint_date"
output: "text"  # Options: "text", "json"
check_schema: false
compact: false
ui_mode: "auto"  # Options: "auto", "textual", "tkinter"
export_failures: null  # Directory to write the QA failure fix sheet into; null to disable
export_format: "csv"  # Fix sheet format: csv, json, or xlsx
export_max_rows: 1000  # Max rows captured per check per table for the fix sheet
strict_columns: false  # Treat all missing staging columns as errors (default: only PK and NOT NULL/no-default are errors)
